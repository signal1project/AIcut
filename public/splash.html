<!DOCTYPE html>
<html>
<head>
  <title>Social Manager AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #041d1a;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, sans-serif;
    }
    .splash-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .splash-logo {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #34d399 0%, #059669 100%);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeInAndScale 1.2s ease-out forwards;
    }
    .splash-logo svg {
      width: 40px;
      height: 40px;
      fill: #041d1a;
    }
    .splash-title {
      font-size: 20px;
      font-weight: 600;
      color: rgba(255, 233, 208, 0.9);
      letter-spacing: -0.01em;
      animation: fadeIn 1.2s ease-out 0.2s forwards;
      opacity: 0;
    }
    .splash-subtitle {
      font-size: 13px;
      color: rgba(255, 233, 208, 0.4);
      animation: fadeIn 1.2s ease-out 0.4s forwards;
      opacity: 0;
    }
    @keyframes fadeInAndScale {
      0%   { opacity: 0; transform: scale(0.85); }
      60%  { opacity: 1; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="splash-logo">
      <!-- Simple signal/broadcast icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
    </div>
    <div class="splash-title">Social Manager AI</div>
    <div class="splash-subtitle">Loading…</div>
  </div>
</body>
</html>
