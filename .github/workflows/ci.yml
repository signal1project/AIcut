name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip native build scripts — the DB tests are ABI-gated and skip when
      # better-sqlite3 isn't built for the current runtime (see vitest config).
      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npx vitest run
